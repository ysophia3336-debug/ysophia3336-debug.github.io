{% extends "base.html" %}
{% block content %}
<div class="product-detail">
    <img src="{{ product.img }}" alt = "{{ product.name }}">
    <div class="info">
        <h1>{{ product.name }}</h1>
        <p class="price">${{ "%.2f"|format(product.price) }}</p>
        <a href = "{{ url_for('add_to_cart', pid=product.id) }}" class="btn">Add to Cart</a>
    </div>
</div>
{% endblock %}
<p>end</p>
