{% extends "base.html"%}
{% block content %}
<h1 class="title">Shopping Cart</h1>
{% if cart_items %}
    <div class = "cart-items">
        {% for item in cart_items%}
        <div class="cart-card">
            <img src="{{ item.img }}" alt="{{ item.name }}">
            <div class="cart-info">
                <h2>{{ item.name }}</h2>
                <p>${{ "%.2f"|format(item.price) }}</p>
                <a href="{{ url_for('remove_from_cart', cart_id=item.cart_id) }}" class="btn remove-btn">Remove</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <h2 class="total">Total: ${{ "%.2f"|format(total) }}</h2>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}
{% endblock %}
